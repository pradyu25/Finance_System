services:
  api:
    build: .
    container_name: finance_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - finance_db:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/finance.db
    restart: unless-stopped

